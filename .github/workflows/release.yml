name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"

permissions:
  contents: write

env:
  BUN_RUNTIME_VERSION: 1.3.11

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ "${TAG}" == *"-beta."* ]]; then
            CHANNEL="beta"
            PRERELEASE="true"
          else
            CHANNEL="stable"
            PRERELEASE="false"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            exit 0
          fi
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --prerelease --notes ""
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes ""
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            bun_target: bun-darwin-x64
          - runner: macos-14
            bun_target: bun-darwin-aarch64
          - runner: windows-latest
            bun_target: bun-windows-x64
          - runner: ubuntu-22.04
            bun_target: bun-linux-x64
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ github.token }}
      SUPERPOWER_GH_REPO: ${{ github.repository }}
      SUPERPOWER_TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Sync versions from tag
        run: bun run sync:version ${{ github.ref_name }}

      - name: Stage bundled Bun
        run: bun run fetch:bun --platform ${{ matrix.bun_target }} --version ${{ env.BUN_RUNTIME_VERSION }}

      - name: Build Tauri bundles
        run: bunx tauri build

      - name: Upload release assets
        shell: bash
        run: |
          mapfile -t FILES < <(find src-tauri/target/release/bundle -type f \
            ! -name "*.d" \
            ! -name "*.o")
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release assets were produced" >&2
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${FILES[@]}" --clobber

      - name: Upload updater manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest-${{ matrix.bun_target }}
          path: src-tauri/target/release/bundle/**/latest.json
          if-no-files-found: error

  merge-updater-manifest:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: updater-manifest-*
          merge-multiple: true

      - name: Merge updater manifests
        run: bun run generate:updater-manifest --input-dir artifacts --output artifacts/latest.json

      - name: Upload merged manifest to current release
        run: gh release upload "${GITHUB_REF_NAME}" artifacts/latest.json --clobber

      - name: Update beta channel pointer
        if: needs.prepare.outputs.channel == 'beta'
        shell: bash
        run: |
          git tag -fa beta "${GITHUB_SHA}" -m "Current beta channel"
          git push origin refs/tags/beta --force
          if ! gh release view beta >/dev/null 2>&1; then
            gh release create beta --title "beta" --prerelease --notes "Current beta channel"
          fi
          gh release upload beta artifacts/latest.json --clobber
